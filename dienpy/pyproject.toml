[project]
name = "dienpy"
dynamic = ["version", "description"]
dependencies = [
    "flask",
    "flask-cors",
    "html2text",
    "pandas",
    "requests",
    "rich",
    "beautifulsoup4",
    "lxml",
    "html5lib",
    "tabulate",
    "brotli",
    "arxiv",
]

[project.scripts]
dienpy = "dienpy.__main__:main"

[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "dienpy"
dynamic = ["version", "description"]
dependencies = [
    "flask",
    "flask-cors",
    "html2text",
    "pandas",
    "pyarrow",
    "requests",
    "rich",
    "beautifulsoup4",
    "lxml",
    "html5lib",
    "tabulate",
    "brotli",
    "arxiv",
    "python-dotenv",
    "pytz>=2026.1.post1",
    "google-api-python-client>=2.192.0",
    "google-auth>=2.49.1",
]

[project.scripts]
dienpy = "dienpy.__main__:main"

[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"
